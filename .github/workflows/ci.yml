name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  check-skills:
    name: Check Skills Sync
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release): v') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check skill symlinks
        run: |
          for skill in yoetz; do
            test -L .claude/skills/$skill || (echo "❌ .claude/skills/$skill is not a symlink" && exit 1)
            test -L .agents/skills/$skill || (echo "❌ .agents/skills/$skill is not a symlink" && exit 1)
            test "$(readlink .claude/skills/$skill)" = "../../skills/$skill" || (echo "❌ .claude/skills/$skill target wrong" && exit 1)
            test "$(readlink .agents/skills/$skill)" = "../../skills/$skill" || (echo "❌ .agents/skills/$skill target wrong" && exit 1)
          done
          diff -rq skills/yoetz .claude/skills/yoetz || (echo "❌ content mismatch" && exit 1)
          echo "✓ Skill symlinks valid"

  changes:
    name: Detect Light-Only Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      light_only: ${{ steps.detect.outputs.light_only }}
      browser_changed: ${{ steps.detect.outputs.browser_changed }}
      build_os_matrix: ${{ steps.detect.outputs.build_os_matrix }}
      release_push: ${{ steps.detect.outputs.release_push }}
    env:
      PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PUSH_BEFORE_SHA: ${{ github.event.before }}
      PUSH_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          set -euo pipefail

          full_build_matrix='["ubuntu-latest","macos-latest","windows-latest"]'
          linux_build_matrix='["ubuntu-latest"]'
          build_os_matrix="$linux_build_matrix"

          emit_outputs() {
            {
              echo "light_only=$1"
              echo "browser_changed=$2"
              echo "build_os_matrix=$3"
              echo "release_push=$4"
            } >> "$GITHUB_OUTPUT"
          }

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              base="$PR_BASE_SHA"
              head="$PR_HEAD_SHA"
              if [[ "${PR_HEAD_REF:-}" == release/* ]]; then
                build_os_matrix="$full_build_matrix"
              fi
              ;;
            push)
              commit_subject="${PUSH_COMMIT_MESSAGE%%$'\n'*}"
              if [[ "$commit_subject" == chore\(release\):\ v* ]]; then
                emit_outputs true false "$linux_build_matrix" true
                exit 0
              fi
              base="$PUSH_BEFORE_SHA"
              head="$GITHUB_SHA"
              ;;
            workflow_dispatch)
              emit_outputs false true "$full_build_matrix" false
              exit 0
              ;;
            *)
              emit_outputs false true "$linux_build_matrix" false
              exit 0
              ;;
          esac

          if [[ -z "${base:-}" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            emit_outputs false true "$build_os_matrix" false
            exit 0
          fi

          mapfile -t files < <(git diff --name-only "$base" "$head")
          if ((${#files[@]} == 0)); then
            emit_outputs false true "$build_os_matrix" false
            exit 0
          fi

          # A PR is "light-only" when every changed file matches one of these
          # categories:
          #   - release bookkeeping: Cargo.toml/lock, CHANGELOG.md, plugin /
          #     skill manifests.
          #   - documentation: any *.md, anything under docs/, README*.
          #   - repo infrastructure: anything under .github/, .gitignore,
          #     .gitleaks.toml, LICENSE*.
          #
          # Light-only PRs skip the heavy build / test / browser jobs. The
          # required checks (Format, Clippy, Test) still RUN to keep the
          # GitHub "required status checks" list satisfied without needing
          # admin-bypass, but they short-circuit after checkout to keep the
          # whole PR under a minute. See clippy / test jobs below.
          #
          # Ordinary PRs and main pushes intentionally use the Ubuntu build
          # only. Cross-platform release builds remain covered before release
          # by release/* PRs, and on demand by workflow_dispatch.
          # Bash case-pattern `*` matches any characters including `/`, so
          # `docs/*` covers any depth under `docs/`.
          light_only=true
          browser_changed=false
          for file in "${files[@]}"; do
            matched=false
            case "$file" in
              Cargo.toml|Cargo.lock) matched=true ;;
              CHANGELOG.md) matched=true ;;
              .claude-plugin/plugin.json|.codex-plugin/plugin.json) matched=true ;;
              skills/*/SKILL.md) matched=true ;;
              *.md) matched=true ;;
              docs/*) matched=true ;;
              README*) matched=true ;;
              .github/*) matched=true ;;
              .gitignore|.gitleaks.toml) matched=true ;;
              LICENSE*) matched=true ;;
            esac

            case "$file" in
              extensions/*) browser_changed=true ;;
              recipes/*) browser_changed=true ;;
              scripts/build-chatgpt-native-extension.sh) browser_changed=true ;;
              scripts/build-live-cdp-daemon.sh) browser_changed=true ;;
              scripts/ci-real-browser-smoke.sh) browser_changed=true ;;
              crates/yoetz-cli/src/*browser*) browser_changed=true ;;
              crates/yoetz-cli/src/*chatgpt*) browser_changed=true ;;
              crates/yoetz-cli/src/live_*) browser_changed=true ;;
              crates/yoetz-cli/src/chrome_*) browser_changed=true ;;
              crates/yoetz-cli/tests/*browser*) browser_changed=true ;;
              crates/yoetz-cli/tests/*chatgpt*) browser_changed=true ;;
            esac

            if [[ "$matched" != "true" ]]; then
              light_only=false
            fi
          done

          emit_outputs "$light_only" "$browser_changed" "$build_os_matrix" false

  release-commit-fast-path:
    name: Release Commit Fast Path
    needs: changes
    if: needs.changes.outputs.release_push == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - run: |
          echo "Release commit detected on main."
          echo "The Release workflow owns release verification, artifact builds, and package publication for this commit."

  browser-scripts:
    name: Browser Scripts
    needs: changes
    if: needs.changes.outputs.release_push != 'true' && needs.changes.outputs.light_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Verify live-CDP daemon bundle
        run: ./scripts/build-live-cdp-daemon.sh --check
      - name: Verify ChatGPT native extension package
        run: ./scripts/build-chatgpt-native-extension.sh --check
      - name: Test ChatGPT native extension
        run: node --test extensions/chatgpt-native/tests/*.test.js
      - run: npm ci --prefix scripts --omit=dev --ignore-scripts
      - name: Verify sweet-cookie exports
        working-directory: scripts
        run: |
          node --input-type=module -e "
            import { getCookies, toCookieHeader } from '@steipete/sweet-cookie';
            if (typeof getCookies !== 'function') throw new Error('getCookies is not a function');
            if (typeof toCookieHeader !== 'function') throw new Error('toCookieHeader is not a function');
            console.log('sweet-cookie exports verified');
          "
      - name: Smoke-test cookie extractor imports
        working-directory: scripts
        run: node ./extract-cookies.mjs --smoke-test

  fmt:
    name: Format
    needs: changes
    if: needs.changes.outputs.release_push != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.release_push != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Light-only short-circuit
        if: needs.changes.outputs.light_only == 'true'
        run: |
          echo "Skipping Clippy because this PR only touches docs / changelog / workflow files."
          echo "See the 'Detect Light-Only Changes' job for the file set that triggered the fast path."
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: needs.changes.outputs.light_only != 'true'
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: needs.changes.outputs.light_only != 'true'
        with:
          shared-key: rust-stable-${{ runner.os }}
          cache-bin: false
      - run: cargo clippy --workspace --all-targets -- -D warnings
        if: needs.changes.outputs.light_only != 'true'

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.release_push != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Light-only short-circuit
        if: needs.changes.outputs.light_only == 'true'
        run: |
          echo "Skipping Test because this PR only touches docs / changelog / workflow files."
          echo "See the 'Detect Light-Only Changes' job for the file set that triggered the fast path."
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: needs.changes.outputs.light_only != 'true'
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: needs.changes.outputs.light_only != 'true'
        with:
          shared-key: rust-stable-${{ runner.os }}
          cache-bin: false
      - run: cargo test --workspace
        if: needs.changes.outputs.light_only != 'true'

  msrv:
    name: MSRV (1.88)
    needs: changes
    if: needs.changes.outputs.release_push != 'true' && needs.changes.outputs.light_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rust-msrv-1.88-${{ runner.os }}
          cache-bin: false
      - run: cargo check --workspace

  doc:
    name: Documentation
    needs: changes
    if: needs.changes.outputs.release_push != 'true' && needs.changes.outputs.light_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rust-stable-${{ runner.os }}
          cache-bin: false
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  deny:
    name: Cargo Deny
    needs: changes
    if: needs.changes.outputs.release_push != 'true' && needs.changes.outputs.light_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2
        with:
          command: check
          arguments: --all-features

  gitleaks:
    name: Gitleaks
    needs: changes
    if: needs.changes.outputs.release_push != 'true' && needs.changes.outputs.light_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  build:
    name: Build (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.release_push != 'true' && needs.changes.outputs.light_only != 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: ${{ fromJSON(needs.changes.outputs.build_os_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rust-stable-${{ runner.os }}
          cache-bin: false
      - run: cargo build --release --workspace
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: matrix.os != 'windows-latest'
        with:
          name: yoetz-${{ matrix.os }}
          path: target/release/yoetz
          retention-days: 3
          compression-level: 0
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: matrix.os == 'windows-latest'
        with:
          name: yoetz-${{ matrix.os }}
          path: target/release/yoetz.exe
          retention-days: 3
          compression-level: 0

  browser-integration:
    name: Real-Browser Smoke (Chrome for Testing)
    needs: changes
    if: needs.changes.outputs.release_push != 'true' && needs.changes.outputs.light_only != 'true' && (github.event_name != 'pull_request' || needs.changes.outputs.browser_changed == 'true' || startsWith(github.head_ref, 'release/'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rust-stable-${{ runner.os }}
          cache-bin: false
      - name: Install Chrome for Testing
        id: install-chrome
        uses: browser-actions/setup-chrome@4f8e94349a351df0f048634f25fec36c3c91eded # v2
        with:
          chrome-version: stable
      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            jq \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libgbm1 \
            libasound2t64 \
            fonts-liberation \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libu2f-udev \
            libvulkan1 \
            xdg-utils
      - name: Fake-ChatGPT fixture tests
        env:
          YOETZ_CHROME_BIN: ${{ steps.install-chrome.outputs.chrome-path }}
        run: cargo test -p yoetz fake_chatgpt_fixture_ -- --ignored
      - name: Build yoetz smoke binary
        run: cargo build --bin yoetz
      - name: Real-browser smoke
        env:
          YOETZ_CHROME_BIN: ${{ steps.install-chrome.outputs.chrome-path }}
          YOETZ_BIN: target/debug/yoetz
        run: ./scripts/ci-real-browser-smoke.sh
