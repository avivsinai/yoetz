name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-skills:
    name: Check Skills Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check skill symlinks
        run: |
          for skill in yoetz; do
            test -L .claude/skills/$skill || (echo "❌ .claude/skills/$skill is not a symlink" && exit 1)
            test -L .agents/skills/$skill || (echo "❌ .agents/skills/$skill is not a symlink" && exit 1)
            test "$(readlink .claude/skills/$skill)" = "../../skills/$skill" || (echo "❌ .claude/skills/$skill target wrong" && exit 1)
            test "$(readlink .agents/skills/$skill)" = "../../skills/$skill" || (echo "❌ .agents/skills/$skill target wrong" && exit 1)
          done
          diff -rq skills/yoetz .claude/skills/yoetz || (echo "❌ content mismatch" && exit 1)
          echo "✓ Skill symlinks valid"

  changes:
    name: Detect Release-Only Changes
    runs-on: ubuntu-latest
    outputs:
      release_only: ${{ steps.detect.outputs.release_only }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          set -euo pipefail

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
              ;;
            push)
              base="${{ github.event.before }}"
              head="${{ github.sha }}"
              ;;
            *)
              echo "release_only=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            echo "release_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t files < <(git diff --name-only "$base" "$head")
          if ((${#files[@]} == 0)); then
            echo "release_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          release_only=true
          for file in "${files[@]}"; do
            case "$file" in
              Cargo.toml|Cargo.lock|CHANGELOG.md) ;;
              *)
                release_only=false
                break
                ;;
            esac
          done

          echo "release_only=$release_only" >> "$GITHUB_OUTPUT"

  browser-scripts:
    name: Browser Scripts
    needs: changes
    if: needs.changes.outputs.release_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci --prefix scripts --omit=dev --ignore-scripts
      - name: Verify sweet-cookie exports
        working-directory: scripts
        run: |
          node --input-type=module -e "
            import { getCookies, toCookieHeader } from '@steipete/sweet-cookie';
            if (typeof getCookies !== 'function') throw new Error('getCookies is not a function');
            if (typeof toCookieHeader !== 'function') throw new Error('toCookieHeader is not a function');
            console.log('sweet-cookie exports verified');
          "
      - name: Smoke-test cookie extractor imports
        working-directory: scripts
        run: node ./extract-cookies.mjs --smoke-test

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.release_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.release_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  msrv:
    name: MSRV (1.88)
    needs: changes
    if: needs.changes.outputs.release_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  doc:
    name: Documentation
    needs: changes
    if: needs.changes.outputs.release_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  deny:
    name: Cargo Deny
    needs: changes
    if: needs.changes.outputs.release_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  gitleaks:
    name: Gitleaks
    needs: changes
    if: needs.changes.outputs.release_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  build:
    name: Build (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.release_only != 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace
      - uses: actions/upload-artifact@v7
        if: matrix.os != 'windows-latest'
        with:
          name: yoetz-${{ matrix.os }}
          path: target/release/yoetz
          retention-days: 3
      - uses: actions/upload-artifact@v7
        if: matrix.os == 'windows-latest'
        with:
          name: yoetz-${{ matrix.os }}
          path: target/release/yoetz.exe
          retention-days: 3
