name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect release metadata changes
        id: release_meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
            echo "diff_range=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            RANGE="origin/${BASE_REF}...HEAD"
          elif [ -n "${BEFORE_SHA:-}" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            RANGE="${BEFORE_SHA}...${HEAD_SHA}"
          else
            RANGE="$(git rev-list --max-parents=0 HEAD | tail -1)...HEAD"
          fi

          echo "diff_range=$RANGE" >> "$GITHUB_OUTPUT"
          CHANGED="$(git diff --name-only "$RANGE" -- Cargo.toml Cargo.lock CHANGELOG.md cliff.toml .github/workflows/release.yml)"
          if [ -n "$CHANGED" ]; then
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
            printf 'Release metadata changed in %s:\n%s\n' "$RANGE" "$CHANGED"
          else
            echo "should_validate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install git-cliff
        if: steps.release_meta.outputs.should_validate == 'true'
        uses: taiki-e/install-action@git-cliff
      - name: Verify tagged releases in CHANGELOG
        if: steps.release_meta.outputs.should_validate == 'true'
        run: |
          # Use workspace version as pending tag so release PRs match
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          git-cliff --tag "v${VERSION}" --output CHANGELOG.check.md
          # Compare only tagged release sections — the [Unreleased] section
          # naturally drifts on PR branches (includes the PR's own commits).
          ACTUAL=$(sed -n '/^## \[[0-9]/,$p' CHANGELOG.md)
          EXPECTED=$(sed -n '/^## \[[0-9]/,$p' CHANGELOG.check.md)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::CHANGELOG.md tagged releases are stale. Run 'git-cliff --tag vX.Y.Z -o CHANGELOG.md' and commit."
            diff <(echo "$ACTUAL") <(echo "$EXPECTED") || true
            exit 1
          fi
      - name: Skip changelog validation
        if: steps.release_meta.outputs.should_validate != 'true'
        run: echo "No release metadata changes detected; skipping changelog validation."

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace
      - uses: actions/upload-artifact@v7
        if: matrix.os != 'windows-latest'
        with:
          name: yoetz-${{ matrix.os }}
          path: target/release/yoetz
      - uses: actions/upload-artifact@v7
        if: matrix.os == 'windows-latest'
        with:
          name: yoetz-${{ matrix.os }}
          path: target/release/yoetz.exe
