name: Notify Skills Marketplace

on:
  push:

concurrency:
  group: notify-marketplace-${{ github.sha }}
  cancel-in-progress: true

jobs:
  notify:
    if: github.ref_type == 'branch' && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Dispatch plugin update
        env:
          GITHUB_TOKEN: ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}
        shell: bash
        run: |
          payload=$(printf '{"event_type":"plugin-update","client_payload":{"repo":"%s"}}' "$GITHUB_REPOSITORY")
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/avivsinai/skills-marketplace/dispatches \
            -d "$payload"
