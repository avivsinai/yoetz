name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release (e.g., v0.2.24)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: "release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.sha }}"
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare Release
    if: "${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'chore(release): v') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.prepare.outputs.tag }}
      version: ${{ steps.prepare.outputs.version }}
      release_ref: ${{ steps.prepare.outputs.release_ref }}
      release_sha: ${{ steps.prepare.outputs.release_sha }}
      prerelease: ${{ steps.prepare.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: prepare
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        shell: bash
        run: |
          set -euo pipefail

          validate_tag() {
            local tag="$1"
            if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
              echo "::error::Release identifiers must use vX.Y.Z style tags."
              exit 1
            fi
          }

          tag_commit_sha() {
            git rev-parse "refs/tags/${1}^{commit}" 2>/dev/null || git rev-parse "refs/tags/${1}"
          }

          case "$EVENT_NAME" in
            workflow_dispatch)
              tag="$INPUT_TAG"
              validate_tag "$tag"
              git fetch --force --tags origin
              if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null 2>&1; then
                echo "::error::Tag ${tag} does not exist. workflow_dispatch is only for rerunning an existing release."
                exit 1
              fi
              release_ref="$tag"
              release_sha="$(tag_commit_sha "$tag")"
              ;;
            push)
              commit_subject="${COMMIT_MESSAGE%%$'\n'*}"
              tag="${commit_subject#chore(release): }"
              # Squash-merge appends " (#NN)" — strip it.
              tag="${tag%% \(#*}"
              validate_tag "$tag"

              version="${tag#v}"
              cargo_version="$(
                awk '
                  /^\[workspace\.package\]$/ { in_section = 1; next }
                  /^\[/ { in_section = 0 }
                  in_section && $1 == "version" {
                    gsub(/"/, "", $3)
                    print $3
                    exit
                  }
                ' Cargo.toml
              )"
              if [[ -z "$cargo_version" ]]; then
                echo "::error::Could not read workspace version from Cargo.toml."
                exit 1
              fi
              if [[ "$cargo_version" != "$version" ]]; then
                echo "::error::Commit tag ${tag} does not match Cargo.toml version ${cargo_version}."
                exit 1
              fi

              release_ref="${GITHUB_SHA}"
              release_sha="${GITHUB_SHA}"
              if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null 2>&1; then
                existing_sha="$(tag_commit_sha "$tag")"
                if [[ "$existing_sha" != "$release_sha" ]]; then
                  echo "::error::Tag ${tag} already exists but points to ${existing_sha}, not ${release_sha}."
                  exit 1
                fi
              else
                git tag "${tag}" "${release_sha}"
                git push origin "refs/tags/${tag}"
              fi
              ;;
            *)
              echo "::error::Unsupported event: ${EVENT_NAME}"
              exit 1
              ;;
          esac

          version="${tag#v}"
          prerelease=false
          if [[ "$tag" == *-* ]]; then
            prerelease=true
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_ref=${release_ref}" >> "$GITHUB_OUTPUT"
          echo "release_sha=${release_sha}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    needs: prepare
    if: needs.prepare.result == 'success'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: yoetz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: yoetz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            artifact: yoetz
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: yoetz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: yoetz.exe

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} staging/
          cp -r scripts staging/scripts
          cp -r recipes staging/recipes
          npm ci --prefix staging/scripts --omit=dev --ignore-scripts
          cd staging
          tar czf ../yoetz-${{ matrix.target }}.tar.gz ${{ matrix.artifact }} scripts recipes

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "staging/"
          Copy-Item "scripts" "staging/scripts" -Recurse
          Copy-Item "recipes" "staging/recipes" -Recurse
          npm ci --prefix staging/scripts --omit=dev --ignore-scripts
          Compress-Archive -Path "staging/*" -DestinationPath "yoetz-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: yoetz-${{ matrix.target }}
          path: yoetz-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: [prepare, build]
    if: needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum yoetz-* > SHA256SUMS.txt

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Generate release notes
        uses: taiki-e/install-action@git-cliff
      - name: Extract release notes for this tag
        id: release_notes
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          git-cliff --tag "$TAG" --unreleased --strip header --output RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.release_sha }}
          name: ${{ needs.prepare.outputs.tag }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          allow_updates: true
          overwrite_files: true
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/yoetz-*
            artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: [prepare, release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.prerelease != 'true' }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Update formula
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"

          SHA_X86_MAC=$(sha256sum artifacts/yoetz-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_ARM_MAC=$(sha256sum artifacts/yoetz-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_X86_LINUX=$(sha256sum artifacts/yoetz-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_ARM_LINUX=$(sha256sum artifacts/yoetz-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/avivsinai/homebrew-tap.git" tap

          cat > tap/Formula/yoetz.rb <<RUBY
          # typed: false
          # frozen_string_literal: true

          class Yoetz < Formula
            desc "Fast CLI-first LLM council, bundler, and multimodal gateway for coding agents"
            homepage "https://github.com/avivsinai/yoetz"
            version "${VERSION}"
            license "MIT"
            depends_on "node"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/avivsinai/yoetz/releases/download/${TAG}/yoetz-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_MAC}"
              end
              if Hardware::CPU.arm?
                url "https://github.com/avivsinai/yoetz/releases/download/${TAG}/yoetz-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM_MAC}"
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/avivsinai/yoetz/releases/download/${TAG}/yoetz-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_LINUX}"
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/avivsinai/yoetz/releases/download/${TAG}/yoetz-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_ARM_LINUX}"
              end
            end

            def install
              bin.install "yoetz"
              (share/"yoetz").install "scripts", "recipes"
            end

            test do
              system "#{bin}/yoetz", "--version"
            end
          end
          RUBY

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/yoetz.rb
          git commit -m "yoetz ${TAG}"
          git push

  update-scoop:
    name: Update Scoop Manifest
    needs: [prepare, release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.prerelease != 'true' }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Update manifest
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"

          SHA_WIN=$(sha256sum artifacts/yoetz-x86_64-pc-windows-msvc.zip | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/avivsinai/scoop-bucket.git" bucket

          cat > bucket/bucket/yoetz.json <<EOF
          {
              "version": "${VERSION}",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/avivsinai/yoetz/releases/download/${TAG}/yoetz-x86_64-pc-windows-msvc.zip",
                      "bin": [
                          "yoetz.exe"
                      ],
                      "hash": "${SHA_WIN}"
                  }
              },
              "homepage": "https://github.com/avivsinai/yoetz",
              "license": "MIT",
              "description": "Fast CLI-first LLM council, bundler, and multimodal gateway for coding agents"
          }
          EOF

          cd bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/yoetz.json
          git commit -m "yoetz ${TAG}"
          git push
