name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release (e.g., v0.2.24)"
        required: true
        type: string
      skip-skill-publish:
        description: "Skip skill publishing (Homebrew/Scoop always update when release runs)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: "release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.sha }}"
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  prepare:
    name: Prepare Release
    if: "${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'chore(release): v') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.prepare.outputs.tag }}
      version: ${{ steps.prepare.outputs.version }}
      release_ref: ${{ steps.prepare.outputs.release_ref }}
      release_sha: ${{ steps.prepare.outputs.release_sha }}
      prerelease: ${{ steps.prepare.outputs.prerelease }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: prepare
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        shell: bash
        run: |
          set -euo pipefail

          validate_tag() {
            local tag="$1"
            if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
              echo "::error::Release identifiers must use vX.Y.Z style tags."
              exit 1
            fi
          }

          tag_commit_sha() {
            git rev-parse "refs/tags/${1}^{commit}" 2>/dev/null || git rev-parse "refs/tags/${1}"
          }

          case "$EVENT_NAME" in
            workflow_dispatch)
              tag="$INPUT_TAG"
              validate_tag "$tag"
              git fetch --force --tags origin
              if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null 2>&1; then
                echo "::error::Tag ${tag} does not exist. workflow_dispatch is only for rerunning an existing release."
                exit 1
              fi
              git checkout --detach "$tag"
              version="${tag#v}"
              ./scripts/check-release-version.sh "$version"
              release_ref="$tag"
              release_sha="$(tag_commit_sha "$tag")"
              ;;
            push)
              commit_subject="${COMMIT_MESSAGE%%$'\n'*}"
              tag="${commit_subject#chore(release): }"
              # Squash-merge appends " (#NN)" — strip it.
              tag="${tag%% \(#*}"
              validate_tag "$tag"

              version="${tag#v}"
              cargo_version="$(
                awk '
                  /^\[workspace\.package\]$/ { in_section = 1; next }
                  /^\[/ { in_section = 0 }
                  in_section && $1 == "version" {
                    gsub(/"/, "", $3)
                    print $3
                    exit
                  }
                ' Cargo.toml
              )"
              if [[ -z "$cargo_version" ]]; then
                echo "::error::Could not read workspace version from Cargo.toml."
                exit 1
              fi
              if [[ "$cargo_version" != "$version" ]]; then
                echo "::error::Commit tag ${tag} does not match Cargo.toml version ${cargo_version}."
                exit 1
              fi

              ./scripts/check-release-version.sh "$version"

              release_ref="${GITHUB_SHA}"
              release_sha="${GITHUB_SHA}"
              if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null 2>&1; then
                existing_sha="$(tag_commit_sha "$tag")"
                if [[ "$existing_sha" != "$release_sha" ]]; then
                  echo "::error::Tag ${tag} already exists but points to ${existing_sha}, not ${release_sha}."
                  exit 1
                fi
              fi
              ;;
            *)
              echo "::error::Unsupported event: ${EVENT_NAME}"
              exit 1
              ;;
          esac

          prerelease=false
          if [[ "$tag" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "release_ref=${release_ref}"
            echo "release_sha=${release_sha}"
            echo "prerelease=${prerelease}"
          } >> "$GITHUB_OUTPUT"

  verify:
    name: Verify Release Commit
    needs: prepare
    if: needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-bin: false

      - name: Verify release metadata
        run: ./scripts/check-release-version.sh "${{ needs.prepare.outputs.version }}"

      - name: Verify ChatGPT native extension package
        run: ./scripts/build-chatgpt-native-extension.sh --check

      - name: Test ChatGPT native extension
        run: node --test extensions/chatgpt-native/tests/*.test.js

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  build:
    name: Build (${{ matrix.target }})
    needs: [prepare, verify]
    if: needs.prepare.result == 'success' && needs.verify.result == 'success'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: yoetz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: yoetz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            artifact: yoetz
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: yoetz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: yoetz.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-${{ runner.os }}-${{ matrix.target }}
          cache-bin: false

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@9c28cc1e9a88ba271487a912a46f2ef66471dbc6 # cross

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Codesign macOS binary
        if: runner.os == 'macOS'
        run: codesign --force --sign - --identifier io.github.avivsinai.yoetz target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} staging/
          cp -r scripts staging/scripts
          cp -r recipes staging/recipes
          npm ci --prefix staging/scripts --omit=dev --ignore-scripts
          cd staging
          tar czf ../yoetz-${{ matrix.target }}.tar.gz ${{ matrix.artifact }} scripts recipes

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "staging/"
          Copy-Item "scripts" "staging/scripts" -Recurse
          Copy-Item "recipes" "staging/recipes" -Recurse
          npm ci --prefix staging/scripts --omit=dev --ignore-scripts
          Compress-Archive -Path "staging/*" -DestinationPath "yoetz-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: yoetz-${{ matrix.target }}
          path: yoetz-${{ matrix.target }}.*
          retention-days: 1
          compression-level: 0

  build-chatgpt-native-extension:
    name: Build ChatGPT Native Extension
    needs: [prepare, verify]
    if: needs.prepare.result == 'success' && needs.verify.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Build extension zip
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          ./scripts/build-chatgpt-native-extension.sh

          zip_path="extensions/chatgpt-native/dist/yoetz-chatgpt-native-extension.zip"
          if [[ ! -f "$zip_path" ]]; then
            printf '::error::Expected extension zip at %s.\n' "$zip_path"
            exit 1
          fi

          cp "$zip_path" "yoetz-chatgpt-native-extension-${VERSION}.zip"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: yoetz-chatgpt-native-extension
          path: yoetz-chatgpt-native-extension-${{ needs.prepare.outputs.version }}.zip
          retention-days: 1
          compression-level: 0

  release:
    name: Create Release
    needs: [prepare, verify, build, build-chatgpt-native-extension]
    if: >-
      needs.prepare.result == 'success' && needs.verify.result == 'success'
      && needs.build.result == 'success'
      && needs['build-chatgpt-native-extension'].result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
          fetch-depth: 0

      - name: Create release tag after verification
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare.outputs.release_sha }}
        run: |
          set -euo pipefail

          tag_commit_sha() {
            git rev-parse "refs/tags/${1}^{commit}" 2>/dev/null || git rev-parse "refs/tags/${1}"
          }

          git fetch --force --tags origin
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            existing_sha="$(tag_commit_sha "$TAG")"
            if [[ "$existing_sha" != "$RELEASE_SHA" ]]; then
              echo "::error::Tag ${TAG} already exists but points to ${existing_sha}, not ${RELEASE_SHA}."
              exit 1
            fi
          else
            git tag "$TAG" "$RELEASE_SHA"
            git push origin "refs/tags/${TAG}"
          fi

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum yoetz-* > SHA256SUMS.txt

      - name: Collect attestation subjects
        id: attestation_subjects
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t subjects < <(find artifacts -maxdepth 1 -type f | sort)
          if ((${#subjects[@]} == 0)); then
            echo "::error::No release artifacts found to attest."
            exit 1
          fi
          {
            echo "subjects<<EOF"
            printf '%s\n' "${subjects[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: ${{ steps.attestation_subjects.outputs.subjects }}

      - name: Extract release notes for this tag
        id: release_notes
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${TAG#v}"
          python3 - "$VERSION" <<'PY'
          import pathlib
          import re
          import sys

          version = sys.argv[1]
          text = pathlib.Path("CHANGELOG.md").read_text()
          pattern = re.compile(
              rf"(?ms)^## \[{re.escape(version)}\] - \d{{4}}-\d{{2}}-\d{{2}}\n.*?(?=^## \[|\Z)"
          )
          match = pattern.search(text)
          if not match:
              raise SystemExit(f"missing changelog section for {version}")
          pathlib.Path("RELEASE_NOTES.md").write_text(match.group(0).strip() + "\n")
          PY
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.release_sha }}
          name: ${{ needs.prepare.outputs.tag }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          overwrite_files: true
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/yoetz-*
            artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-skills:
    name: Publish Skills
    needs: [prepare, release]
    if: >-
      needs.prepare.result == 'success' && needs.release.result == 'success'
      && (github.event_name == 'push' || inputs.skip-skill-publish != true)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - name: Install skild
        run: npm install -g skild

      - name: Configure skild auth
        run: |
          mkdir -p ~/.skild
          echo '${{ secrets.SKILD_AUTH_JSON }}' > ~/.skild/registry-auth.json

      - name: Verify release metadata
        run: ./scripts/check-release-version.sh "${{ needs.prepare.outputs.version }}"

      - name: Publish skills
        run: |
          TAG_VERSION="${{ needs.prepare.outputs.version }}"

          echo "$TAG_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$' || {
            echo "ERROR: version '$TAG_VERSION' is not semver"
            exit 1
          }

          FAILED=0

          for dir in skills/*/; do
            [ -f "$dir/SKILL.md" ] || continue
            SKILL=$(basename "$dir")
            VERSION="${TAG_VERSION}"

            echo "Publishing $SKILL version $VERSION"

            ALIAS_ARGS=()
            if [ ${#SKILL} -ge 3 ] && [ ${#SKILL} -le 64 ]; then
              ALIAS_ARGS=(--alias "$SKILL")
            else
              echo "⚠ Skipping alias for $SKILL: length ${#SKILL} outside 3..64"
            fi

            if OUTPUT=$(npx skild publish \
              --dir "$dir" \
              "${ALIAS_ARGS[@]}" \
              --skill-version "$VERSION" 2>&1); then
              echo "$OUTPUT"
              echo "✓ Published $SKILL version $VERSION"
            elif echo "$OUTPUT" | grep -q "Version already exists"; then
              echo "$OUTPUT"
              echo "⚠ $SKILL version $VERSION already published — skipping"
            elif echo "$OUTPUT" | grep -q "Alias already in use"; then
              echo "$OUTPUT"
              echo "⚠ Alias '$SKILL' taken — retrying without alias..."
              if OUTPUT2=$(npx skild publish \
                --dir "$dir" \
                --skill-version "$VERSION" 2>&1); then
                echo "$OUTPUT2"
                echo "✓ Published $SKILL version $VERSION (without alias)"
              elif echo "$OUTPUT2" | grep -q "Version already exists"; then
                echo "$OUTPUT2"
                echo "⚠ $SKILL version $VERSION already published on retry — skipping"
              else
                echo "✖ Publish failed for $SKILL (even without alias)"
                echo "$OUTPUT2"
                FAILED=1
              fi
            else
              echo "✖ Publish failed for $SKILL"
              echo "$OUTPUT"
              FAILED=1
            fi
          done

          exit $FAILED

  update-homebrew:
    name: Update Homebrew Formula
    needs: [prepare, release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    if: >-
      needs.prepare.result == 'success' && needs.prepare.outputs.prerelease != 'true'
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Update formula
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"

          SHA_X86_MAC=$(sha256sum artifacts/yoetz-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_ARM_MAC=$(sha256sum artifacts/yoetz-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_X86_LINUX=$(sha256sum artifacts/yoetz-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_ARM_LINUX=$(sha256sum artifacts/yoetz-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/avivsinai/homebrew-tap.git" tap

          cat > tap/Formula/yoetz.rb <<RUBY
          # typed: false
          # frozen_string_literal: true

          class Yoetz < Formula
            desc "Fast CLI-first LLM council, bundler, and multimodal gateway for coding agents"
            homepage "https://github.com/avivsinai/yoetz"
            version "${VERSION}"
            license "MIT"
            depends_on "node"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/avivsinai/yoetz/releases/download/${TAG}/yoetz-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_MAC}"
              end
              if Hardware::CPU.arm?
                url "https://github.com/avivsinai/yoetz/releases/download/${TAG}/yoetz-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM_MAC}"
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/avivsinai/yoetz/releases/download/${TAG}/yoetz-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_LINUX}"
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/avivsinai/yoetz/releases/download/${TAG}/yoetz-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_ARM_LINUX}"
              end
            end

            def install
              bin.install "yoetz"
              (share/"yoetz").install "scripts", "recipes"
            end

            test do
              system "#{bin}/yoetz", "--version"
            end
          end
          RUBY

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/yoetz.rb
          git commit -m "yoetz ${TAG}"
          git push

  update-scoop:
    name: Update Scoop Manifest
    needs: [prepare, release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    if: >-
      needs.prepare.result == 'success' && needs.prepare.outputs.prerelease != 'true'
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Update manifest
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"

          SHA_WIN=$(sha256sum artifacts/yoetz-x86_64-pc-windows-msvc.zip | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/avivsinai/scoop-bucket.git" bucket

          cat > bucket/bucket/yoetz.json <<EOF
          {
              "version": "${VERSION}",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/avivsinai/yoetz/releases/download/${TAG}/yoetz-x86_64-pc-windows-msvc.zip",
                      "bin": [
                          "yoetz.exe"
                      ],
                      "hash": "${SHA_WIN}"
                  }
              },
              "homepage": "https://github.com/avivsinai/yoetz",
              "license": "MIT",
              "description": "Fast CLI-first LLM council, bundler, and multimodal gateway for coding agents"
          }
          EOF

          cd bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/yoetz.json
          git commit -m "yoetz ${TAG}"
          git push
