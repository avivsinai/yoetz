name: chatgpt
# Authoritative contract note:
# The shared ChatGPT recipe request/output contract now lives in
# `crates/yoetz-cli/src/chatgpt_recipe.rs`. This YAML still defines the
# generic agent-browser action sequence, but MCP/dev-browser consume the same
# typed Rust contract even when they do not execute these steps literally.
# Transport order:
#   1. chrome-devtools-mcp — direct CDP client against running Chrome 147+
#      (uses vendored `headless_chrome`; NOT a bridge to the chrome-devtools-mcp
#      MCP server, despite the name — the module name is historical)
#   2. dev-browser (fallback for Chrome <= 146 / Chrome for Testing)
#   3. agent-browser (managed browser fallback)
#   4. manual (last resort; upload the bundle yourself)
#
# Recommended: enable chrome://inspect/#remote-debugging (Chrome 144+) for auto-connect.
# Note: Chrome 136+ ignores --remote-debugging-port on the default profile.
# Note: yoetz CLI cannot proxy through a parent agent's MCP server; all
# transports connect directly to Chrome via CDP.
#
# Variables:
#   model    — model slug (e.g., "gpt-5-4-pro"). Default: "auto" selects the
#              best available model, preferring Pro with Extended enabled when
#              the account has it.
#              Set to "" or "current" to keep the current ChatGPT selector state.
#   extended — set to "false" to disable Extended Pro. Default: keep Extended on.
#   prompt   — prompt text to send with the attachment. For Yoetz bundle
#              sessions, typed ChatGPT transports default this to bundle.json's
#              stored user prompt unless --var prompt=... explicitly overrides.
#   browser_context_id — exact Chrome `browserContextId` to target when multiple
#              signed-in Chrome contexts are live in the same browser process.
#   profile_email — signed-in Chrome profile email to target (for example
#              `user@example.com`). Yoetz resolves this to a live
#              `browserContextId` from the tabs currently open in Chrome for
#              CDP transports. For chrome-extension-native, it is a fail-closed
#              verifier for the Chrome profile where the extension is installed.
#   extension_instance_id — chrome-extension-native-only stable Yoetz extension
#              instance id from `yoetz browser extension status --chatgpt`.
#              Use this when Chrome profile email is unavailable or ambiguous.
#   extension_profile_id — chrome-extension-native-only Chrome identity profile
#              id from extension status. Optional secondary selector.
#   thread   — "fresh" (default). Every yoetz request opens a new ChatGPT tab
#              marked with `?_yoetz=<run-id>` so the user's own ChatGPT tabs
#              are never touched. Passing `thread=reuse` is rejected; parallel
#              yoetz runs work automatically because each run owns its own tab.
#   wait_timeout_ms  — overall response wait deadline in ms (default: 1800000 = 30min).
#   wait_interval_ms — poll interval in ms (default: 30000 = 30s).
#   upload_timeout_ms  — attachment upload deadline in ms (default: 120000 = 2min).
#   upload_interval_ms — attachment upload poll interval in ms (default: 2000 = 2s).
#   send_timeout_ms — extension-native send-button enable deadline in ms
#              (default: 120000 = 2min).

transports:
  - chrome-devtools-mcp
  - dev-browser
  - agent-browser
  - manual

defaults:
  prompt: Review the attached file and provide your analysis.
  model: "auto"
  extended: ""
  thread: "fresh"
  upload_timeout_ms: "120000"
  upload_interval_ms: "2000"
  send_timeout_ms: "120000"
  wait_timeout_ms: "1800000"
  wait_interval_ms: "30000"

steps:
  # Step 1: always open a fresh yoetz-owned ChatGPT tab for this run.
  - action: open
    args: ["https://chatgpt.com/?_yoetz={{run_id}}"]
  - sleep_ms: 4000

  # Step 2: set a durable in-page backup marker before any recipe interaction.
  - action: eval
    args:
      - |
        (() => {
          window.name = "yoetz:{{run_id}}";
          return "marked yoetz-owned chatgpt tab";
        })()
  - sleep_ms: 500

  # Step 3: safety net — if we somehow landed on an existing conversation
  # (URL contains /c/), click "New chat" to guarantee a clean slate.
  - action: eval
    args:
      - |
        (() => {
          if (!window.location.pathname.startsWith('/c/')) return "already new chat";
          const btn = document.querySelector(
            'a[href="/"], button[data-testid="create-new-chat-button"], nav a[class*="new"]'
          );
          if (btn) { btn.click(); return "clicked new chat"; }
          window.location.href = 'https://chatgpt.com/?_yoetz=' + Date.now();
          return "force-navigated to new chat";
        })()
  - sleep_ms: 2000

  # Model selection is handled by the built-in Rust action so MCP,
  # dev-browser, and the generic browser transport share one selector.
  - action: chatgpt_select_model
  - sleep_ms: 500

  # Disable Extended Pro only when explicitly requested (--var extended=false).
  - action: eval
    args:
      - |
        (() => {
          const extended = "{{extended}}";
          if (extended !== "false") return "skipped: extended not disabled";
          const btn = document.querySelector('button[aria-label*="click to remove"][aria-label*="Extended"]');
          if (btn) { btn.click(); return "disabled Extended Pro"; }
          return "Extended Pro already off";
        })()
  - sleep_ms: 500

  # File attachment is the only delivery path.
  # Open the attachment menu.
  - action: chatgpt_open_attachment_ui
  - sleep_ms: 500

  # Upload the bundle file through the composer-scoped file input.
  - action: chatgpt_upload_bundle

  # Poll until the upload spinner disappears. Short-burst Rust-side polling
  # keeps each eval under the agent-browser IPC ceiling (25s).
  - action: chatgpt_wait_upload
    args: ["--interval-ms", "{{upload_interval_ms}}", "--timeout-ms", "{{upload_timeout_ms}}"]

  # Click back into the composer so the next step uses real keyboard input
  # against ProseMirror after the attachment flow completes.
  - action: eval
    args:
      - |
        (() => {
          const el = document.querySelector("#prompt-textarea");
          if (!el) throw new Error("prompt textarea not found");
          el.click();
          return "focused prompt textarea";
        })()
  - sleep_ms: 500

  # Type just the prompt (bundle is already attached) with real key events so
  # the send button enables reliably.
  - action: type
    args: ["#prompt-textarea", "{{prompt}}"]
  - sleep_ms: 500

  # Click send once the typed prompt has enabled the button.
  - action: chatgpt_send

  # Poll for response completion. Default 30min timeout for Extended Pro;
  # override with --var wait_timeout_ms=N or --var wait_interval_ms=N.
  - action: chatgpt_wait_response
    args: ["--interval-ms", "{{wait_interval_ms}}", "--timeout-ms", "{{wait_timeout_ms}}"]
    timeout_ms: 10000

  # Capture final state
  - action: snapshot
    args: ["-c", "--json"]
