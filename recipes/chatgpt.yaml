name: chatgpt
# Auth: resolved automatically (explicit CDP > auto_connect > cookie > profile).
# Recommended: enable chrome://inspect/#remote-debugging (Chrome 144+) for auto-connect.
# Note: Chrome 136+ ignores --remote-debugging-port on the default profile.
#
# Variables:
#   model    — model slug (e.g., "gpt-5-4-pro"). Omit to keep current.
#   extended — set to "false" to disable Extended Pro. Default: leave as-is.
#   prompt   — prompt text to send with the attachment.

defaults:
  prompt: Review the attached file and provide your analysis.
  model: ""
  extended: ""

steps:
  # Navigate to a fresh ChatGPT conversation. Append a timestamp query param
  # so the SPA router treats it as a new navigation even when the tab is
  # already on chatgpt.com/ (otherwise it's a no-op and we reuse the old thread).
  - action: eval
    args:
      - "window.location.href = 'https://chatgpt.com/?_yoetz=' + Date.now()"
  - sleep_ms: 4000

  # Safety: if we landed on an existing conversation (URL contains /c/),
  # click "New chat" to guarantee a clean slate.
  - action: eval
    args:
      - |
        (() => {
          if (!window.location.pathname.startsWith('/c/')) return "already new chat";
          const btn = document.querySelector(
            'a[href="/"], button[data-testid="create-new-chat-button"], nav a[class*="new"]'
          );
          if (btn) { btn.click(); return "clicked new chat"; }
          window.location.href = 'https://chatgpt.com/?_yoetz=' + Date.now();
          return "force-navigated to new chat";
        })()
  - sleep_ms: 2000

  # Select model if --var model is provided.
  - action: eval
    args:
      - |
        (() => {
          const raw = "{{model}}";
          if (!raw) return "skipped: no model specified";
          const btn = document.querySelector(
            '[data-testid="model-switcher-dropdown-button"], ' +
            'button[aria-label="Model selector"]'
          );
          if (!btn) throw new Error("model selector button not found — ChatGPT may have changed their UI. Inspect the model picker for data-testid or aria-label attributes.");
          btn.click();
          return "opened model selector";
        })()
  - sleep_ms: 1200
  - action: eval
    args:
      - |
        (() => {
          const raw = "{{model}}";
          if (!raw) return "skipped: no model specified";
          const slug = raw.toLowerCase();
          const byTestId = document.querySelector('[data-testid="model-switcher-' + slug + '"]');
          if (byTestId) { byTestId.click(); return "selected: " + slug; }
          const names = {"gpt-5-4-pro":"pro","gpt-5-4-thinking":"thinking","gpt-5-3":"instant","pro":"pro","thinking":"thinking","instant":"instant"};
          const target = names[slug] || slug;
          const items = Array.from(document.querySelectorAll('[role="menuitem"]'));
          const match = items.find(el => (el.textContent||"").trim().toLowerCase().includes(target));
          if (match) { match.click(); return "selected: " + target; }
          throw new Error("model '" + slug + "' not found");
        })()
  - sleep_ms: 500

  # Disable Extended Pro only when explicitly requested (--var extended=false).
  - action: eval
    args:
      - |
        (() => {
          const extended = "{{extended}}";
          if (extended !== "false") return "skipped: extended not disabled";
          const btn = document.querySelector('button[aria-label*="click to remove"][aria-label*="Extended"]');
          if (btn) { btn.click(); return "disabled Extended Pro"; }
          return "Extended Pro already off";
        })()
  - sleep_ms: 500

  # Open the attachment UI if ChatGPT hides the file input until the user
  # clicks its paperclip button.
  - action: eval
    args:
      - |
        (() => {
          const btn = document.querySelector(
            'button[aria-label*="Attach"], button[aria-label*="attach"], button[data-testid*="attach"]'
          );
          if (!btn) return "skipped: attach button not found";
          btn.click();
          return "opened attachment UI";
        })()
  - sleep_ms: 500

  # Upload the bundle as an attachment instead of injecting it into the
  # contenteditable composer.
  - action: upload
    args: ["input[type='file']", "{{bundle_path}}"]
  - sleep_ms: 2000

  # Clear the textarea before entering the prompt. Uses execCommand so the
  # edit goes through ProseMirror's transaction system (innerHTML= bypasses it).
  - action: eval
    args:
      - |
        (() => {
          const el = document.querySelector("#prompt-textarea");
          el.focus();
          if (el.textContent.trim()) {
            document.execCommand('selectAll');
            document.execCommand('delete');
          }
          return "cleared";
        })()

  # Insert prompt via execCommand('insertText') which fires beforeinput/input
  # events that ProseMirror intercepts. Playwright fill() sets innerHTML
  # directly, bypassing ProseMirror state — leaving the send button disabled.
  # {{prompt|json}} produces a JSON-escaped string literal (with quotes),
  # safe for embedding in JS source regardless of quotes/newlines.
  - action: eval
    args:
      - |
        (() => {
          const el = document.querySelector("#prompt-textarea");
          el.focus();
          const text = {{prompt|json}};
          document.execCommand('insertText', false, text);
          return "inserted prompt (" + text.length + " chars)";
        })()
  - sleep_ms: 500

  # Click send. ProseMirror already processed the execCommand so React
  # state is in sync — no extra InputEvent dispatch needed.
  - action: eval
    args:
      - |
        (() => {
          const btn = document.querySelector("button[data-testid='send-button']");
          if (!btn) throw new Error("send button not found");
          if (btn.disabled) throw new Error("send button disabled — text may not have been injected");
          btn.click();
          return "sent";
        })()

  # Poll in short bursts under the agent-browser IPC ceiling until the
  # response completes.
  - action: chatgpt_wait_response
    args: ["--attempts", "30", "--interval-ms", "15000"]
    timeout_ms: 10000

  # Capture final state
  - action: snapshot
    args: ["-c", "--json"]
