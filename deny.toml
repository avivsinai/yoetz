# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

[licenses]
version = 2
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
    "LGPL-2.1-or-later",
    "GPL-3.0-or-later",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# auto_generate_cdp is a build-time code generator for headless_chrome's CDP
# bindings. It reads Chrome's protocol JSON spec and emits Rust source at
# compile time — the generator itself is NOT linked into the yoetz binary.
[[licenses.clarify]]
name = "auto_generate_cdp"
version = "0.4.6"
expression = "GPL-3.0-or-later"
license-files = [{ path = "LICENSE.txt", hash = 0xba8ef827 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/avivsinai/litellm-rust"]
